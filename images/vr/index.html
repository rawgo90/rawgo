<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWGO VR Walkthrough</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
  #viewer { width: 100%; height: 100%; }

  #scene-panel {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 200px;
    background: rgba(10,10,10,0.88);
    backdrop-filter: blur(12px);
    border-right: 1px solid rgba(184,156,110,0.2);
    z-index: 10;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    overflow-y: auto;
  }
  #scene-panel.hidden { transform: translateX(-200px); }

  .panel-header {
    padding: 1rem 1rem 0.6rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #b89c6e;
    border-bottom: 1px solid rgba(184,156,110,0.15);
    flex-shrink: 0;
  }
  .scene-list { padding: 0.4rem 0; }
  .scene-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.6rem 1rem;
    background: none;
    border: none;
    cursor: pointer;
    color: #7a746a;
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    text-align: left;
    transition: all 0.2s;
  }
  .scene-btn:hover { color: #f7f5f0; background: rgba(184,156,110,0.08); }
  .scene-btn.active { color: #b89c6e; background: rgba(184,156,110,0.12); }
  .scene-btn .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(184,156,110,0.3);
    flex-shrink: 0;
  }
  .scene-btn.active .dot { background: #b89c6e; }

  #toggle-tab {
    position: absolute;
    top: 50%;
    left: 200px;
    transform: translateY(-50%);
    z-index: 11;
    background: rgba(10,10,10,0.88);
    border: 1px solid rgba(184,156,110,0.2);
    border-left: none;
    color: #b89c6e;
    padding: 0.6rem 0.35rem;
    cursor: pointer;
    transition: left 0.3s ease;
    font-size: 0.75rem;
    line-height: 1;
    backdrop-filter: blur(12px);
  }
  #toggle-tab.collapsed { left: 0; }

  #fullscreen-btn {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 10;
    background: rgba(10,10,10,0.75);
    border: 1px solid rgba(184,156,110,0.3);
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.2s;
  }
  #fullscreen-btn:hover { background: rgba(184,156,110,0.15); border-color: #b89c6e; }

  #loading {
    position: absolute;
    inset: 0;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    flex-direction: column;
    gap: 1rem;
  }
  #loading p {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #b89c6e;
  }
  .spinner {
    width: 26px; height: 26px;
    border: 2px solid rgba(184,156,110,0.2);
    border-top-color: #b89c6e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* hotspot: createTooltipFunc로 SVG 직접 주입 */
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading VR</p>
</div>

<div id="viewer"></div>

<div id="scene-panel">
  <div class="panel-header">— Scenes</div>
  <div class="scene-list" id="scene-list"></div>
</div>

<button id="toggle-tab" onclick="togglePanel()">&#9664;</button>

<button id="fullscreen-btn" onclick="openFullscreen()">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#b89c6e" stroke-width="1.8">
    <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
  </svg>
</button>

<script src="data.js"></script>
<script>
(function () {
  const scenes = APP_DATA.scenes;

  // sceneId → scene 맵
  const idToScene = {};
  scenes.forEach(s => { idToScene[s.id] = s; });

  // 원하는 씬 순서 (name 기준)
  const ORDER = [
    '118VR_현관',
    '118VR_현관팬트리',
    '118VR_거실',
    '118VR_주방',
    '118VR_주방팬트리',
    '118VR_룸1',
    '118VR_룸1드레스룸',
    '118VR_부부욕실',
    '118VR_룸2',
    '118VR_룸2드레스룸',
    '118VR_룸3',
    '118VR_룸3드레스룸',
    '118VR_룸4',
    '118VR_룸4드레스룸',
    '118VR_가족욕실'
  ];

  // 순서대로 정렬 (ORDER에 없는 씬은 뒤로)
  const sorted = [
    ...ORDER.map(name => scenes.find(s => s.name === name)).filter(Boolean),
    ...scenes.filter(s => !ORDER.includes(s.name))
  ];

  // pannellum sceneId: 정렬된 인덱스 기준
  const nameToIndex = {};
  sorted.forEach((s, i) => { nameToIndex[s.name] = i; });

  // data.js id → 정렬 인덱스 맵 (핫스팟 target 연결용)
  const idToIndex = {};
  sorted.forEach((s, i) => { idToIndex[s.id] = i; });

  const pannellumScenes = {};

  sorted.forEach((scene, i) => {
    const pannId  = 'scene_' + i;
    const imgPath = 'images/' + scene.name + '.jpg';

    const iv    = scene.initialViewParameters;
    const yaw   = iv.yaw   * (180 / Math.PI);
    const pitch = iv.pitch * (180 / Math.PI);
    const hfov  = iv.fov   * (180 / Math.PI);

    const hotSpots = (scene.linkHotspots || []).map(hs => ({
      pitch:    hs.pitch * (180 / Math.PI),
      yaw:      hs.yaw   * (180 / Math.PI),
      type:     'scene',
      sceneId:  'scene_' + idToIndex[hs.target],
      cssClass: 'hs-link',
      createTooltipFunc: createHotspot
    }));

    pannellumScenes[pannId] = {
      title:    scene.name,
      panorama: imgPath,
      yaw, pitch, hfov,
      hotSpots
    };
  });

  // 화살표 SVG 핫스팟
  function createHotspot(el) {
    el.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="11" stroke="white" stroke-width="1.5" fill="rgba(0,0,0,0.35)"/>
        <path d="M12 16V8M8.5 11.5L12 8l3.5 3.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    el.style.cssText = 'background:none;border:none;cursor:pointer;';
  }

  const viewer = pannellum.viewer('viewer', {
    default: {
      firstScene:                'scene_0',
      sceneFadeDuration:         600,
      autoLoad:                  true,
      showControls:              false,
      keyboardZoom:              false,
      mouseZoom:                 true,
      draggable:                 true,
      friction:                  0.15,
      autoRotate:                -2,
      autoRotateInactivityDelay: 4000
    },
    scenes: pannellumScenes
  });

  // 씬 목록 버튼
  const list = document.getElementById('scene-list');
  sorted.forEach((scene, i) => {
    const pannId = 'scene_' + i;
    const label  = scene.name.replace(/^.*118VR_/, '');
    const btn    = document.createElement('button');
    btn.className = 'scene-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<span class="dot"></span>${label}`;
    btn.onclick = () => {
      viewer.loadScene(pannId);
      document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    list.appendChild(btn);
  });

  viewer.on('scenechange', id => {
    const idx = parseInt(id.replace('scene_', ''));
    document.querySelectorAll('.scene-btn').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });
  });

  viewer.on('load', () => {
    document.getElementById('loading').style.display = 'none';
  });

})();

function togglePanel() {
  const panel = document.getElementById('scene-panel');
  const tab   = document.getElementById('toggle-tab');
  panel.classList.toggle('hidden');
  tab.classList.toggle('collapsed');
  tab.innerHTML = panel.classList.contains('hidden') ? '&#9654;' : '&#9664;';
}

function openFullscreen() {
  window.open(window.location.href, '_blank');
}
</script>
</body>
</html>
