<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWGO AI Render</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #8B6F2E;
    --bg: #0A0A0A;
    --bg2: #111111;
    --bg3: #181818;
    --border: rgba(201,168,76,0.15);
    --text: #F0EDE8;
    --text-dim: #888;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(20px);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--gold);
  }

  .logo span {
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-left: 12px;
  }

  .header-badge {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 2px;
  }

  /* Main layout */
  main {
    padding-top: 80px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
  }

  /* Left panel */
  .panel-left {
    border-right: 1px solid var(--border);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    background: var(--bg2);
    position: relative;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* API Key input */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-field {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    width: 100%;
    transition: border-color 0.2s;
    outline: none;
  }

  .input-field:focus {
    border-color: var(--gold-dim);
  }

  .input-field::placeholder {
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Model selector */
  .model-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .model-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .model-card:hover {
    border-color: var(--gold-dim);
  }

  .model-card.active {
    border-color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  .model-card.active .model-dot {
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }

  .model-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .model-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .model-desc {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .model-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .model-price {
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.05em;
  }

  .model-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  /* Prompt area */
  .prompt-area {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    width: 100%;
    height: 160px;
    resize: none;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }

  .prompt-area:focus {
    border-color: var(--gold-dim);
  }

  .prompt-area::placeholder {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
  }

  /* Quick prompts */
  .quick-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .quick-btn {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--gold-dim);
    border: 1px solid var(--border);
    background: transparent;
    padding: 5px 10px;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: all 0.2s;
  }

  .quick-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  /* Render button */
  .render-btn {
    background: var(--gold);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 3px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .render-btn:hover:not(:disabled) {
    background: var(--gold-light);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(201,168,76,0.3);
  }

  .render-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .render-btn.loading {
    background: var(--gold-dim);
  }

  /* Right panel */
  .panel-right {
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* Upload zone */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 4px;
    aspect-ratio: 16/9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    background: var(--bg2);
    max-height: 340px;
  }

  .upload-zone:hover {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.02);
  }

  .upload-zone.has-image {
    border-style: solid;
    border-color: var(--border);
  }

  .upload-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .upload-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .upload-zone.has-image:hover .upload-overlay {
    opacity: 1;
  }

  .upload-icon {
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    color: var(--gold-dim);
  }

  .upload-text {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .upload-sub {
    font-size: 11px;
    color: #555;
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Result area */
  .result-area {
    border: 1px solid var(--border);
    border-radius: 4px;
    aspect-ratio: 16/9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: var(--bg2);
    max-height: 340px;
  }

  .result-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .result-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #333;
  }

  /* Loading animation */
  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 12px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Panel labels */
  .panel-title {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* Download btn */
  .download-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 8px 14px;
    border-radius: 2px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .download-btn:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  /* Grid layout for panels */
  .panels-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .panel-box {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Error message */
  .error-msg {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 3px;
    padding: 10px 14px;
    font-size: 12px;
    color: #ff8080;
    display: none;
  }

  /* Cost badge */
  .cost-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 2px;
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.08em;
  }

  input[type="file"] { display: none; }

  /* Gold line decoration */
  .gold-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 4px 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    .panels-row { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    RAWGO
    <span>AI Render</span>
  </div>
  <div class="header-badge">Powered by Google Gemini</div>
</header>

<main>
  <!-- Left Control Panel -->
  <div class="panel-left">

    <!-- API Key -->
    <div>
      <div class="section-label">API Key</div>
      <div class="input-group">
        <input type="password" class="input-field" id="apiKey" placeholder="Google AI Studio API Key 입력">
      </div>
    </div>

    <div class="gold-line"></div>

    <!-- Model Selection -->
    <div>
      <div class="section-label">모델 선택</div>
      <div class="model-grid">
        <div class="model-card" data-model="gemini-2.5-flash-preview-04-17" data-price="$0.039" onclick="selectModel(this)">
          <div class="model-info">
            <div class="model-name">Nano Banana</div>
            <div class="model-desc">Gemini 2.5 Flash · 빠른 가렌더</div>
          </div>
          <div class="model-right">
            <div class="model-price">$0.039/장</div>
            <div class="model-dot"></div>
          </div>
        </div>

        <div class="model-card active" data-model="gemini-3.1-flash-image-preview" data-price="$0.067" onclick="selectModel(this)">
          <div class="model-info">
            <div class="model-name">Nano Banana 2</div>
            <div class="model-desc">Gemini 3.1 Flash · 권장</div>
          </div>
          <div class="model-right">
            <div class="model-price">$0.067/장</div>
            <div class="model-dot"></div>
          </div>
        </div>

        <div class="model-card" data-model="gemini-3-pro-image-preview" data-price="$0.134" onclick="selectModel(this)">
          <div class="model-info">
            <div class="model-name">Nano Banana Pro</div>
            <div class="model-desc">Gemini 3 Pro · 최고 품질</div>
          </div>
          <div class="model-right">
            <div class="model-price">$0.134/장</div>
            <div class="model-dot"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="gold-line"></div>

    <!-- Prompt -->
    <div>
      <div class="section-label">프롬프트</div>
      <textarea class="prompt-area" id="prompt" placeholder="예: Transform this SketchUp model into photorealistic interior rendering. Maintain exact camera angle and furniture layout. Apply marble floor, natural daylight, luxury atmosphere."></textarea>

      <div style="margin-top: 10px;">
        <div class="section-label" style="margin-bottom: 8px;">빠른 프롬프트</div>
        <div class="quick-prompts">
          <button class="quick-btn" onclick="setPrompt('interior')">인테리어 기본</button>
          <button class="quick-btn" onclick="setPrompt('luxury')">럭셔리 펜트하우스</button>
          <button class="quick-btn" onclick="setPrompt('office')">오피스</button>
          <button class="quick-btn" onclick="setPrompt('exterior')">익스테리어</button>
          <button class="quick-btn" onclick="setPrompt('night')">야간 조명</button>
        </div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="render-btn" id="renderBtn" onclick="startRender()">
      ✦ Render
    </button>

  </div>

  <!-- Right Preview Panel -->
  <div class="panel-right">
    <div class="panels-row">

      <!-- Input Image -->
      <div class="panel-box">
        <div class="panel-title">원본 이미지 (SketchUp)</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
          </div>
          <div class="upload-text">이미지 업로드</div>
          <div class="upload-sub">SketchUp · Revit · 3ds Max</div>
          <div class="upload-overlay">
            <div class="upload-text" style="color:white;">이미지 변경</div>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
      </div>

      <!-- Result Image -->
      <div class="panel-box">
        <div class="panel-title">렌더링 결과</div>
        <div class="result-area" id="resultArea">
          <div class="result-placeholder" id="resultPlaceholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <div style="font-size:12px; color:#333; letter-spacing:0.1em;">RENDER RESULT</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
  let selectedModel = 'gemini-3.1-flash-image-preview';
  let selectedPrice = '$0.067';
  let uploadedImageBase64 = null;
  let uploadedMimeType = null;

  const PROMPTS = {
    interior: `Transform this SketchUp 3D model into a photorealistic interior rendering.
Maintain exact camera angle, perspective, and all furniture positions.
Remove all sketch lines entirely.
Apply photorealistic materials: polished floor, fabric sofas, glass elements.
Soft natural daylight with warm ambient lighting.
Result must look like a real photograph.`,

    luxury: `Transform this SketchUp model into a photorealistic luxury penthouse interior.
Strictly maintain camera angle, furniture layout, and spatial proportions.
Remove all sketch lines. Result must look like a real photograph.
Apply: polished marble floor with reflections, premium fabric sofas,
glass and metal railings, floor-to-ceiling windows showing city skyline,
soft natural daylight + warm pendant lighting, high-end luxury atmosphere.`,

    office: `Transform this SketchUp model into a photorealistic modern office interior.
Maintain exact camera angle and all furniture positions.
Remove all sketch lines completely.
Apply: polished concrete or wood floor, professional lighting,
clean white walls, modern workstations, natural daylight from windows.
Result must look like a real architectural photograph.`,

    exterior: `Transform this SketchUp 3D model into a photorealistic architectural exterior rendering.
Maintain exact camera angle and building proportions.
Remove all sketch lines entirely.
Apply: real building materials (concrete, glass, metal, stone),
natural sky with clouds, landscaping, soft daylight.
Result must look like a real photograph.`,

    night: `Transform this SketchUp model into a photorealistic interior at night.
Maintain exact camera angle and furniture layout.
Remove all sketch lines completely.
Apply: dramatic warm artificial lighting, glowing pendant lights,
cozy atmosphere, dark windows showing city lights outside,
premium materials with subtle reflections.
Result must look like a real night photograph.`
  };

  function selectModel(card) {
    document.querySelectorAll('.model-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    selectedModel = card.dataset.model;
    selectedPrice = card.dataset.price;
  }

  function setPrompt(type) {
    document.getElementById('prompt').value = PROMPTS[type];
  }

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;

    uploadedMimeType = file.type;
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadedImageBase64 = e.target.result.split(',')[1];

      const zone = document.getElementById('uploadZone');
      zone.classList.add('has-image');
      zone.innerHTML = `
        <img src="${e.target.result}" alt="uploaded">
        <div class="upload-overlay">
          <div class="upload-text" style="color:white; font-size:13px;">이미지 변경</div>
        </div>
      `;
      zone.onclick = () => document.getElementById('fileInput').click();
    };
    reader.readAsDataURL(file);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.style.display = 'block';
    el.textContent = msg;
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function startRender() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const prompt = document.getElementById('prompt').value.trim();

    hideError();

    if (!apiKey) { showError('API Key를 입력해주세요.'); return; }
    if (!uploadedImageBase64) { showError('SketchUp 이미지를 업로드해주세요.'); return; }
    if (!prompt) { showError('프롬프트를 입력하거나 빠른 프롬프트를 선택해주세요.'); return; }

    const btn = document.getElementById('renderBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.textContent = '렌더링 중...';

    const resultArea = document.getElementById('resultArea');
    resultArea.innerHTML = `
      <div class="result-placeholder">
        <div class="loading-spinner"></div>
        <div class="loading-text">AI 렌더링 처리 중</div>
      </div>
    `;

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                {
                  inline_data: {
                    mime_type: uploadedMimeType,
                    data: uploadedImageBase64
                  }
                },
                { text: prompt }
              ]
            }],
            generationConfig: {
              responseModalities: ["IMAGE", "TEXT"],
              responseMimeType: "text/plain"
            }
          })
        }
      );

      const data = await response.json();

      if (!response.ok) {
        const errMsg = data?.error?.message || '알 수 없는 오류';
        showError(`API 오류: ${errMsg}`);
        resetBtn();
        resultArea.innerHTML = `<div class="result-placeholder"><div style="font-size:12px;color:#555;">렌더링 실패</div></div>`;
        return;
      }

      // Extract image from response
      let imageData = null;
      let imageMime = 'image/png';

      const parts = data?.candidates?.[0]?.content?.parts || [];
      for (const part of parts) {
        if (part.inlineData) {
          imageData = part.inlineData.data;
          imageMime = part.inlineData.mimeType || 'image/png';
          break;
        }
      }

      if (!imageData) {
        showError('이미지 생성에 실패했습니다. 프롬프트를 수정하거나 다시 시도해주세요.');
        resetBtn();
        resultArea.innerHTML = `<div class="result-placeholder"><div style="font-size:12px;color:#555;">결과 없음</div></div>`;
        return;
      }

      const imgSrc = `data:${imageMime};base64,${imageData}`;
      resultArea.innerHTML = `
        <img src="${imgSrc}" alt="rendered">
        <div class="cost-badge">by rawgo · ${selectedPrice}</div>
        <button class="download-btn" onclick="downloadImage('${imgSrc}')">↓ 저장</button>
      `;

    } catch (err) {
      showError(`오류: ${err.message}`);
      resultArea.innerHTML = `<div class="result-placeholder"><div style="font-size:12px;color:#555;">렌더링 실패</div></div>`;
    }

    resetBtn();
  }

  function resetBtn() {
    const btn = document.getElementById('renderBtn');
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = '✦ Render';
  }

  function downloadImage(src) {
    const a = document.createElement('a');
    a.href = src;
    a.download = `rawgo_render_${Date.now()}.png`;
    a.click();
  }

  // Default prompt
  setPrompt('luxury');
</script>
</body>
</html>
