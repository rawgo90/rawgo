<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWGO AI Render v2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #8B6F2E;
    --bg: #0A0A0A;
    --bg2: #111111;
    --bg3: #181818;
    --bg4: #1E1E1E;
    --border: rgba(201,168,76,0.15);
    --border-hover: rgba(201,168,76,0.4);
    --text: #F0EDE8;
    --text-dim: #888;
    --text-muted: #444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(20px);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--gold);
  }

  .logo span {
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-left: 10px;
  }

  .api-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    width: 260px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--gold-dim); }
  .api-input::placeholder { color: var(--text-muted); }

  .model-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  .model-select option { background: var(--bg3); }

  /* Main */
  main {
    padding-top: 72px;
    max-width: 1400px;
    margin: 0 auto;
    padding-left: 24px;
    padding-right: 24px;
  }

  /* Mode selector */
  .mode-bar {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin: 28px 0 24px;
  }

  .mode-btn {
    flex: 1;
    padding: 14px 20px;
    background: var(--bg2);
    border: none;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .mode-btn:last-child { border-right: none; }

  .mode-btn.active {
    background: rgba(201,168,76,0.08);
    color: var(--gold);
    border-bottom: 2px solid var(--gold);
  }

  .mode-btn:hover:not(.active) {
    background: var(--bg3);
    color: var(--text);
  }

  .mode-icon { font-size: 16px; }

  /* Content area */
  .content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  /* Image slots area */
  .slots-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .slot-row {
    display: flex;
    gap: 12px;
  }

  /* Image slot */
  .img-slot {
    flex: 1;
    border: 1px dashed var(--border);
    border-radius: 4px;
    aspect-ratio: 4/3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    background: var(--bg2);
  }

  .img-slot:hover {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.02);
  }

  .img-slot.has-image {
    border-style: solid;
    border-color: rgba(201,168,76,0.25);
  }

  .img-slot.required {
    border-color: rgba(201,168,76,0.3);
  }

  .img-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  .slot-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .img-slot.has-image:hover .slot-overlay { opacity: 1; }

  .slot-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 8px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
    text-align: center;
  }

  .img-slot.has-image .slot-label {
    color: var(--gold);
  }

  .slot-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding-bottom: 24px;
  }

  .slot-placeholder svg { color: var(--text-muted); }

  .slot-placeholder-text {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.5;
  }

  .slot-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 2px;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dim);
  }

  .slot-badge.required-badge {
    background: rgba(201,168,76,0.1);
    color: var(--gold);
    border-color: rgba(201,168,76,0.3);
  }

  /* Right panel */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Prompt */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .prompt-area {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    width: 100%;
    height: 130px;
    resize: none;
    outline: none;
    line-height: 1.7;
    transition: border-color 0.2s;
  }

  .prompt-area:focus { border-color: var(--gold-dim); }
  .prompt-area::placeholder { color: var(--text-muted); font-size: 11px; }

  /* Quick prompts */
  .quick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .quick-btn {
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    border: 1px solid var(--border);
    background: var(--bg3);
    padding: 8px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: all 0.2s;
    text-align: left;
    line-height: 1.4;
  }

  .quick-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
    background: rgba(201,168,76,0.04);
  }

  .quick-btn-label {
    display: block;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  /* Render button */
  .render-btn {
    background: var(--gold);
    color: #000;
    border: none;
    padding: 15px;
    border-radius: 3px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }

  .render-btn:hover:not(:disabled) {
    background: var(--gold-light);
    box-shadow: 0 6px 20px rgba(201,168,76,0.3);
  }

  .render-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Result */
  .result-section {
    margin-top: 4px;
  }

  .result-box {
    border: 1px solid var(--border);
    border-radius: 4px;
    aspect-ratio: 16/7;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: var(--bg2);
  }

  .result-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: absolute;
    inset: 0;
  }

  .result-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.12em;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .download-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,0.85);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 7px 14px;
    border-radius: 2px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .download-btn:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  .result-meta {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 2px;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 0.08em;
  }

  /* Error */
  .error-msg {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.2);
    border-radius: 3px;
    padding: 10px 14px;
    font-size: 11px;
    color: #ff8080;
    display: none;
    line-height: 1.5;
  }

  /* Mode descriptions */
  .mode-desc {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 2px solid var(--gold-dim);
    border-radius: 3px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    letter-spacing: 0.03em;
  }

  input[type="file"] { display: none; }

  .gold-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  /* Material target input */
  .target-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  .target-input:focus { border-color: var(--gold-dim); }
  .target-input::placeholder { color: var(--text-muted); font-size: 11px; }

  @media (max-width: 900px) {
    .content { grid-template-columns: 1fr; }
    .slot-row { flex-direction: column; }
    header { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
    .api-input { width: 180px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">RAWGO <span>AI Render v2</span></div>
  <div class="api-row">
    <input type="password" class="api-input" id="apiKey" placeholder="Google AI Studio API Key">
    <select class="model-select" id="modelSelect">
      <option value="gemini-2.5-flash-preview-04-17">Nano Banana · $0.039</option>
      <option value="gemini-3.1-flash-image-preview" selected>Nano Banana 2 · $0.067</option>
      <option value="gemini-3-pro-image-preview">Nano Banana Pro · $0.134</option>
    </select>
  </div>
</header>

<main>

  <!-- Mode selector -->
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('basic')" id="mode-basic">
      <span class="mode-icon">✦</span> 기본 변환
    </button>
    <button class="mode-btn" onclick="setMode('moodboard')" id="mode-moodboard">
      <span class="mode-icon">◈</span> 무드보드 적용
    </button>
    <button class="mode-btn" onclick="setMode('material')" id="mode-material">
      <span class="mode-icon">◉</span> 재질 지정
    </button>
  </div>

  <div class="content">

    <!-- Left: Image slots -->
    <div class="slots-area">

      <!-- Mode description -->
      <div class="mode-desc" id="modeDesc">
        스케치업/3ds Max 뷰포트 이미지를 업로드하면 포토리얼 렌더링으로 변환합니다.
      </div>

      <!-- Slot 1: Source (always visible) -->
      <div class="slot-row">
        <div class="img-slot required" id="slot1" onclick="triggerUpload(1)">
          <div class="slot-badge required-badge">Source</div>
          <div class="slot-placeholder" id="placeholder1">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <div class="slot-placeholder-text">클레이 / 뷰포트<br>이미지 업로드</div>
          </div>
          <div class="slot-label" id="label1">소스 이미지</div>
          <div class="slot-overlay"><div style="font-size:12px;color:white;">변경</div></div>
        </div>
      </div>

      <!-- Slot 2: Moodboard / Material (conditional) -->
      <div class="slot-row" id="slot2row" style="display:none;">
        <div class="img-slot" id="slot2" onclick="triggerUpload(2)">
          <div class="slot-badge" id="slot2badge">Moodboard</div>
          <div class="slot-placeholder" id="placeholder2">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M9 21V9"/>
            </svg>
            <div class="slot-placeholder-text" id="placeholder2text">무드보드<br>이미지 업로드</div>
          </div>
          <div class="slot-label" id="label2">무드보드</div>
          <div class="slot-overlay"><div style="font-size:12px;color:white;">변경</div></div>
        </div>
      </div>

      <!-- Slot 3: Material target (material mode only) -->
      <div id="slot3row" style="display:none;">
        <div class="section-label" style="margin-top:4px;">적용 대상 지정</div>
        <input type="text" class="target-input" id="materialTarget"
          placeholder="예: 소파, 바닥, 벽, 커피테이블 (어디에 재질을 적용할지 입력)">
      </div>

      <input type="file" id="fileInput1" accept="image/*" onchange="handleFile(1, this)">
      <input type="file" id="fileInput2" accept="image/*" onchange="handleFile(2, this)">

    </div>

    <!-- Right: Prompt + Controls -->
    <div class="right-panel">

      <div>
        <div class="section-label">프롬프트</div>
        <textarea class="prompt-area" id="prompt"></textarea>
      </div>

      <div>
        <div class="section-label">빠른 프롬프트</div>
        <div class="quick-grid" id="quickGrid"></div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="render-btn" id="renderBtn" onclick="startRender()">
        ✦ Render
      </button>

    </div>
  </div>

  <!-- Result -->
  <div class="result-section">
    <div class="section-label">렌더링 결과</div>
    <div class="result-box" id="resultBox">
      <div class="result-placeholder" id="resultPlaceholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#2a2a2a" stroke-width="1">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <div style="font-size:11px;color:#2a2a2a;letter-spacing:0.15em;">RENDER RESULT</div>
      </div>
    </div>
  </div>

</main>

<script>
let currentMode = 'basic';
let images = { 1: null, 2: null };
let mimeTypes = { 1: null, 2: null };
let lastResultSrc = null;

const MODE_CONFIG = {
  basic: {
    desc: '스케치업/3ds Max 뷰포트 이미지를 업로드하면 포토리얼 렌더링으로 변환합니다.',
    prompts: [
      { label: '인테리어 기본', text: `Transform this 3D model into a photorealistic interior rendering.\nMaintain exact camera angle, furniture layout, and spatial proportions.\nRemove all sketch lines. Apply photorealistic materials and natural daylight.\nResult must look like a real photograph.` },
      { label: '럭셔리 인테리어', text: `Transform into photorealistic luxury interior.\nKeep exact camera angle and all furniture positions.\nApply: polished marble floor, premium fabrics, glass railings,\ncity skyline view through windows, soft natural daylight.\nResult must look like a real photograph.` },
      { label: '오피스', text: `Transform into photorealistic modern office interior.\nMaintain camera angle and furniture layout.\nApply: clean materials, professional lighting, natural daylight.\nResult must look like a real architectural photograph.` },
      { label: '야간 조명', text: `Transform into photorealistic interior at night.\nMaintain camera angle and furniture layout.\nApply: warm artificial lighting, glowing pendants,\ndark windows showing city lights outside.\nResult must look like a real night photograph.` },
    ]
  },
  moodboard: {
    desc: '소스 이미지(클레이/뷰포트) + 무드보드 이미지를 함께 업로드하세요. AI가 무드보드의 색상, 재질, 분위기를 소스 이미지에 자동으로 적용합니다.',
    prompts: [
      { label: '무드보드 재질 적용', text: `Use the first image as the 3D model source.\nUse the second image as the material and mood reference.\nApply all materials, colors, textures, and atmosphere from the second image to the interior in the first image.\nMaintain exact camera angle, furniture positions, and spatial layout.\nResult must look like a real photograph.` },
      { label: '색상 팔레트만 적용', text: `Use the first image as the 3D model source.\nExtract only the color palette from the second image.\nApply these colors to the interior in the first image.\nMaintain all furniture positions and camera angle.\nResult must look like a real photograph.` },
      { label: '분위기/스타일 적용', text: `Use the first image as the 3D model source.\nReference the overall style, mood and lighting atmosphere from the second image.\nApply this atmosphere to the interior while maintaining exact furniture layout and camera angle.\nResult must look like a real photograph.` },
      { label: '완전 일치 적용', text: `Use the first image as the 3D model/layout source.\nUse the second image as strict material, color, brightness, contrast and reflection reference.\nApply every material from the second image to matching elements in the first image.\nMaintain camera angle and furniture positions exactly.\nResult must look like a real photograph.` },
    ]
  },
  material: {
    desc: '소스 이미지 + 적용할 재질/샘플 이미지를 업로드하고, 어디에 적용할지 지정하세요. (예: 소파, 바닥, 벽)',
    prompts: [
      { label: '지정 위치에 적용', text: `` }, // 동적 생성
      { label: '바닥재 적용', text: `Use the first image as the interior source.\nApply the material/texture from the second image to the FLOOR only.\nMaintain all other materials, camera angle, furniture positions exactly.\nResult must look like a real photograph.` },
      { label: '벽 마감재 적용', text: `Use the first image as the interior source.\nApply the material/texture from the second image to the WALLS only.\nMaintain all other materials, camera angle, furniture positions exactly.\nResult must look like a real photograph.` },
      { label: '가구 패브릭 적용', text: `Use the first image as the interior source.\nApply the fabric/material from the second image to all SOFAS and CHAIRS only.\nMaintain all other materials, camera angle, furniture positions exactly.\nResult must look like a real photograph.` },
    ]
  }
};

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + mode).classList.add('active');

  const cfg = MODE_CONFIG[mode];
  document.getElementById('modeDesc').textContent = cfg.desc;

  // Slot 2 visibility
  const slot2row = document.getElementById('slot2row');
  const slot3row = document.getElementById('slot3row');

  if (mode === 'basic') {
    slot2row.style.display = 'none';
    slot3row.style.display = 'none';
  } else if (mode === 'moodboard') {
    slot2row.style.display = '';
    slot3row.style.display = 'none';
    document.getElementById('slot2badge').textContent = 'Moodboard';
    document.getElementById('label2').textContent = '무드보드';
    document.getElementById('placeholder2text').innerHTML = '무드보드<br>이미지 업로드';
  } else if (mode === 'material') {
    slot2row.style.display = '';
    slot3row.style.display = '';
    document.getElementById('slot2badge').textContent = 'Material';
    document.getElementById('label2').textContent = '재질 샘플';
    document.getElementById('placeholder2text').innerHTML = '재질/샘플<br>이미지 업로드';
  }

  renderQuickPrompts(mode);
  // Set default prompt
  if (cfg.prompts[0].text) {
    document.getElementById('prompt').value = cfg.prompts[0].text;
  }
}

function renderQuickPrompts(mode) {
  const grid = document.getElementById('quickGrid');
  const prompts = MODE_CONFIG[mode].prompts;
  grid.innerHTML = '';
  prompts.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.innerHTML = `<span class="quick-btn-label">${String(i+1).padStart(2,'0')}</span>${p.label}`;
    btn.onclick = () => {
      if (mode === 'material' && i === 0) {
        buildMaterialPrompt();
      } else {
        document.getElementById('prompt').value = p.text;
      }
    };
    grid.appendChild(btn);
  });
}

function buildMaterialPrompt() {
  const target = document.getElementById('materialTarget').value.trim() || '지정된 부분';
  document.getElementById('prompt').value =
`Use the first image as the interior source.
Apply the material/texture from the second image to the ${target}.
Maintain all other materials, camera angle, furniture positions exactly.
Result must look like a real photograph.`;
}

function triggerUpload(slot) {
  document.getElementById('fileInput' + slot).click();
}

function handleFile(slot, input) {
  const file = input.files[0];
  if (!file) return;

  mimeTypes[slot] = file.type;
  const reader = new FileReader();
  reader.onload = (e) => {
    images[slot] = e.target.result.split(',')[1];

    const slotEl = document.getElementById('slot' + slot);
    slotEl.classList.add('has-image');

    const placeholder = document.getElementById('placeholder' + slot);
    if (placeholder) placeholder.style.display = 'none';

    // Add image
    let img = slotEl.querySelector('img');
    if (!img) {
      img = document.createElement('img');
      slotEl.insertBefore(img, slotEl.firstChild);
    }
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.style.display = 'block';
  el.textContent = msg;
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

async function startRender() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('modelSelect').value;
  const prompt = document.getElementById('prompt').value.trim();

  hideError();

  if (!apiKey) { showError('API Key를 입력해주세요.'); return; }
  if (!images[1]) { showError('소스 이미지를 업로드해주세요.'); return; }
  if ((currentMode === 'moodboard' || currentMode === 'material') && !images[2]) {
    showError(currentMode === 'moodboard' ? '무드보드 이미지를 업로드해주세요.' : '재질 샘플 이미지를 업로드해주세요.');
    return;
  }
  if (!prompt) { showError('프롬프트를 입력해주세요.'); return; }

  const btn = document.getElementById('renderBtn');
  btn.disabled = true;
  btn.textContent = '렌더링 중...';

  const resultBox = document.getElementById('resultBox');
  resultBox.innerHTML = `
    <div class="result-placeholder">
      <div class="loading-spinner"></div>
      <div class="loading-text">AI 렌더링 처리 중</div>
    </div>`;

  // Build parts array
  const parts = [];

  // Image 1 (always)
  parts.push({ inline_data: { mime_type: mimeTypes[1], data: images[1] } });

  // Image 2 (moodboard or material mode)
  if ((currentMode === 'moodboard' || currentMode === 'material') && images[2]) {
    parts.push({ inline_data: { mime_type: mimeTypes[2], data: images[2] } });
  }

  // Prompt
  parts.push({ text: prompt });

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts }],
          generationConfig: {
            responseModalities: ['IMAGE', 'TEXT'],
            responseMimeType: 'text/plain'
          }
        })
      }
    );

    const data = await response.json();

    if (!response.ok) {
      showError('API 오류: ' + (data?.error?.message || '알 수 없는 오류'));
      resultBox.innerHTML = `<div class="result-placeholder"><div style="font-size:12px;color:#333;">렌더링 실패</div></div>`;
      resetBtn(); return;
    }

    let imageData = null, imageMime = 'image/png';
    for (const part of (data?.candidates?.[0]?.content?.parts || [])) {
      if (part.inlineData) {
        imageData = part.inlineData.data;
        imageMime = part.inlineData.mimeType || 'image/png';
        break;
      }
    }

    if (!imageData) {
      showError('이미지 생성 실패. 프롬프트를 수정하거나 다시 시도해주세요.');
      resultBox.innerHTML = `<div class="result-placeholder"><div style="font-size:12px;color:#333;">결과 없음</div></div>`;
      resetBtn(); return;
    }

    lastResultSrc = `data:${imageMime};base64,${imageData}`;
    const modeLabel = { basic: '기본변환', moodboard: '무드보드', material: '재질지정' }[currentMode];

    resultBox.innerHTML = `
      <img src="${lastResultSrc}" alt="rendered">
      <div class="result-meta">by rawgo · ${modeLabel}</div>
      <button class="download-btn" onclick="downloadResult()">↓ 저장</button>`;

  } catch(err) {
    showError('오류: ' + err.message);
    resultBox.innerHTML = `<div class="result-placeholder"><div style="font-size:12px;color:#333;">렌더링 실패</div></div>`;
  }

  resetBtn();
}

function resetBtn() {
  const btn = document.getElementById('renderBtn');
  btn.disabled = false;
  btn.textContent = '✦ Render';
}

function downloadResult() {
  if (!lastResultSrc) return;
  const a = document.createElement('a');
  a.href = lastResultSrc;
  a.download = `rawgo_${currentMode}_${Date.now()}.png`;
  a.click();
}

// Init
setMode('basic');
</script>
</body>
</html>
